name: Update universe route data

on:
  workflow_dispatch:
  schedule:
    - cron: "43 10 * * *"
  push:
    branches: ["main"]
    paths:
      - "scripts/update-universe-data.mjs"
      - "public/data/route-overrides.json"
      - ".github/workflows/update-universe-data.yml"

permissions:
  contents: write

concurrency:
  group: universe-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch UEX locations and route distances
        run: node scripts/update-universe-data.mjs

      - name: Validate route graph
        run: |
          node --check scripts/update-universe-data.mjs
          node tests/router.test.mjs

      - name: Commit changed route data
        run: |
          if git diff --quiet -- public/data/universe.json public/data/uex-location-map.json; then
            echo "No universe-data changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/universe.json public/data/uex-location-map.json
          git commit -m "chore: refresh UEX universe route data"
          git push

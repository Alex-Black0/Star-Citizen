name: Update commodity data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 11 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch and normalize UEX commodity data
        env:
          SC_TRADE_API_URL: ${{ vars.SC_TRADE_API_URL }}
          SC_TRADE_API_TOKEN: ${{ secrets.SC_TRADE_API_TOKEN }}
          SC_TRADE_SOURCE_NAME: UEX API 2.0 commodity price snapshot
        run: node scripts/update-trade-data.mjs

      - name: Commit changed data
        run: |
          if git diff --quiet public/data/commodities.json; then
            echo "No commodity changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/commodities.json
          git commit -m "chore: update UEX commodity data"
          git push
